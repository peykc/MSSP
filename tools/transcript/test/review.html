<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MSSP Speaker Review</title>
<style>
  :root {
    --bg: #14110f;
    --panel: #1c1815;
    --panel-2: #241f1a;
    --line: #38322b;
    --text: #ece6da;
    --text-dim: #9a9183;
    --accent: #d97b3f;
    --good: #5a9e6f;
    --bad: #c25450;
    --warn: #c2a050;
    --mono: "IBM Plex Mono", "SF Mono", Consolas, monospace;
    --sans: "IBM Plex Sans", -apple-system, Segoe UI, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
  }
  #setup {
    max-width: 640px;
    margin: 64px auto;
    padding: 32px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
  }
  #setup h1 {
    font-size: 18px;
    margin: 0 0 4px;
    letter-spacing: 0.02em;
  }
  #setup p.sub {
    color: var(--text-dim);
    margin: 0 0 24px;
    font-size: 13px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin: 16px 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input[type=text], input[type=file] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 9px 10px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
  }
  button {
    font-family: var(--sans);
    cursor: pointer;
  }
  #setup button {
    margin-top: 24px;
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #1a140e;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    font-size: 14px;
  }
  #setup .err { color: var(--bad); font-size: 12px; margin-top: 10px; min-height: 16px; }

  #app { display: none; height: 100vh; flex-direction: column; }
  #app.active { display: flex; }

  #topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  #topbar .title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #topbar .stat { font-family: var(--mono); font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  #topbar .stat b { color: var(--text); }
  #topbar .spacer { flex: 1; }
  #topbar audio { height: 32px; }
  #exportBtn {
    background: var(--good);
    color: #0f1a13;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
  }
  #jumpBox {
    width: 70px;
    font-family: var(--mono);
    font-size: 12px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 4px;
    padding: 5px 6px;
  }

  #legend {
    flex: 0 0 auto;
    display: flex;
    gap: 14px;
    padding: 6px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--line);
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
  }
  #legend kbd {
    background: #000;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--text);
  }

  #rows {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 8px 0 120px;
  }
  .row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 8px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .row:hover { background: var(--panel); }
  .row.current { background: #2a2218; }
  .row.playback-active {
    background: #322818;
    box-shadow: inset 3px 0 0 var(--accent);
  }
  .row.marked-correct { box-shadow: inset 3px 0 0 var(--good); }
  .row.marked-wrong { box-shadow: inset 3px 0 0 var(--bad); }
  .row.marked-nonspeech { box-shadow: inset 3px 0 0 var(--warn); opacity: 0.7; }

  .row .t {
    flex: 0 0 64px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding-top: 2px;
  }
  .row .speaker-chip {
    flex: 0 0 96px;
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 7px;
    border-radius: 4px;
    text-align: center;
    height: fit-content;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .row .body { flex: 1 1 auto; line-height: 1.5; padding-top: 1px; }
  .row .actions {
    flex: 0 0 auto;
    display: flex;
    gap: 4px;
    opacity: 0;
  }
  .row:hover .actions, .row.current .actions { opacity: 1; }
  .row .actions button {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
  }
  .row .actions button:hover { border-color: var(--text-dim); }
  .row .actions select {
    font-size: 11px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  .row .note {
    flex: 0 0 auto;
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
    align-self: center;
    max-width: 140px;
  }

  .speaker-divider {
    margin: 0 16px;
    padding: 6px 0 2px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div id="setup">
  <h1>Speaker review</h1>
  <p class="sub">Load a generated transcript JSON and (optionally) the episode audio URL. Mark wrong speaker turns by ear, export ground truth corrections.</p>

  <label>Transcript JSON file</label>
  <input type="file" id="jsonFile" accept=".json">

  <label>Episode audio — pick a local mp3 <em>or</em> paste a URL</label>
  <input type="file" id="audioFile" accept=".mp3,audio/mpeg,audio/*">
  <input type="text" id="audioUrl" placeholder="http://127.0.0.1:8000/episode.mp3  (only if not using file above)">

  <button id="loadBtn">Start review</button>
  <div class="err" id="setupErr"></div>
</div>

<div id="app">
  <div id="topbar">
    <div class="title" id="epTitle">—</div>
    <div class="stat">rows <b id="statTotal">0</b></div>
    <div class="stat">reviewed <b id="statReviewed">0</b></div>
    <div class="stat">flagged wrong <b id="statWrong">0</b></div>
    <div class="spacer"></div>
    <input type="text" id="jumpBox" placeholder="jump mm:ss">
    <audio id="player" controls></audio>
    <button id="exportBtn">Export corrections</button>
  </div>
  <div id="audioErr" style="padding:4px 16px; font-size:11px; color:var(--bad); display:none;"></div>
  <div id="legend">
    <span><kbd>J</kbd>/<kbd>K</kbd> nav row</span>
    <span><kbd>Space</kbd> play/pause</span>
    <span><kbd>C</kbd> mark correct</span>
    <span><kbd>W</kbd> mark wrong</span>
    <span><kbd>N</kbd> mark non-speech</span>
    <span><kbd>Enter</kbd> jump audio to row</span>
  </div>
  <div id="rows"></div>
</div>

<script>
let transcript = null;
let segments = [];      // working copy with review state attached
let speakerList = [];    // distinct speaker ids seen
let currentIdx = -1;
let episodeStem = "";
let audioObjectUrl = null;

const rowsEl = document.getElementById("rows");
const player = document.getElementById("player");

function showAudioErr(msg) {
  const el = document.getElementById("audioErr");
  el.textContent = msg;
  el.style.display = "block";
}

function hideAudioErr() {
  document.getElementById("audioErr").style.display = "none";
}

function attachAudioSource(src, label) {
  hideAudioErr();
  if (audioObjectUrl) {
    URL.revokeObjectURL(audioObjectUrl);
    audioObjectUrl = null;
  }
  player.src = src;
  player.preload = "auto";
  player.load();
  console.info("[review] audio src:", label || src);
  player.onerror = () => {
    const mediaErr = player.error;
    const codes = {
      1: "ABORTED",
      2: "NETWORK (404 or bad URL)",
      3: "DECODE (bad/corrupt file)",
      4: "SRC_NOT_SUPPORTED"
    };
    const label = mediaErr ? (codes[mediaErr.code] || mediaErr.code) : "unknown";
    showAudioErr(`Audio failed to load (${label}): ${src}`);
  };
  player.onloadedmetadata = () => {
    hideAudioErr();
    console.info("[review] audio ready, duration:", player.duration);
  };
}

function segmentIndexAtTime(t) {
  if (!segments.length) return 0;
  if (t < segments[0].startTime) return 0;
  let lo = 0, hi = segments.length - 1, best = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (segments[mid].startTime <= t) {
      best = mid;
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }
  return best;
}

function highlightRow(i, { scroll = false, playback = false } = {}) {
  if (i < 0 || i >= segments.length) return;
  const prev = rowsEl.children[currentIdx];
  const next = rowsEl.children[i];
  if (prev) prev.classList.remove("current", "playback-active");
  currentIdx = i;
  if (next) {
    next.classList.add("current");
    if (playback) next.classList.add("playback-active");
    if (scroll) next.scrollIntoView({ block: "nearest" });
  }
}

function syncRowToPlayback({ scroll = false } = {}) {
  if (!segments.length || !player.src) return;
  const idx = segmentIndexAtTime(player.currentTime);
  const playing = !player.paused;
  if (idx === currentIdx) {
    const el = rowsEl.children[idx];
    if (el) {
      el.classList.toggle("playback-active", playing);
    }
    return;
  }
  highlightRow(idx, { scroll: scroll || playing, playback: playing });
}

player.addEventListener("timeupdate", () => syncRowToPlayback({ scroll: true }));
player.addEventListener("seeked", () => syncRowToPlayback({ scroll: false }));
player.addEventListener("play", () => syncRowToPlayback({ scroll: true }));
player.addEventListener("pause", () => {
  const el = rowsEl.children[currentIdx];
  if (el) el.classList.remove("playback-active");
});

function speakerColor(spk) {
  if (!spk || spk === "UNKNOWN") return { bg: "#3a3a3a", fg: "#bbb" };
  // stable hash -> hue
  let h = 0;
  for (let i = 0; i < spk.length; i++) h = (h * 31 + spk.charCodeAt(i)) % 360;
  return { bg: `hsl(${h}, 38%, 18%)`, fg: `hsl(${h}, 60%, 72%)` };
}

function fmtTime(s) {
  if (s == null) return "--:--";
  s = Math.floor(s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, "0")}`;
}

document.getElementById("loadBtn").addEventListener("click", async () => {
  const fileInput = document.getElementById("jsonFile");
  const audioFileInput = document.getElementById("audioFile");
  const audioUrl = document.getElementById("audioUrl").value.trim();
  const errEl = document.getElementById("setupErr");
  errEl.textContent = "";

  if (!fileInput.files.length) {
    errEl.textContent = "Choose a transcript JSON file first.";
    return;
  }

  const hasAudioFile = audioFileInput.files.length > 0;
  if (!hasAudioFile && !audioUrl) {
    errEl.textContent = "Pick a local mp3 or paste an audio URL — otherwise the player has nothing to load (Network tab will stay empty).";
    return;
  }

  try {
    const text = await fileInput.files[0].text();
    transcript = JSON.parse(text);
  } catch (e) {
    errEl.textContent = "Couldn't parse that JSON: " + e.message;
    return;
  }

  if (!transcript.segments || !Array.isArray(transcript.segments)) {
    errEl.textContent = "This JSON doesn't look like a transcript (no segments array).";
    return;
  }

  episodeStem = (transcript.metadata && transcript.metadata.filenameStem) || fileInput.files[0].name;

  segments = transcript.segments.map((seg, i) => ({
    idx: i,
    startTime: seg.startTime,
    endTime: seg.endTime,
    body: seg.body,
    speaker: seg.speaker || "UNKNOWN",
    origSpeaker: seg.speaker || "UNKNOWN",
    review: null,        // null | "correct" | "wrong" | "nonspeech"
    correctedSpeaker: null,
    note: ""
  }));

  const seen = new Set();
  segments.forEach(s => seen.add(s.speaker));
  speakerList = Array.from(seen).sort();

  if (hasAudioFile) {
    audioObjectUrl = URL.createObjectURL(audioFileInput.files[0]);
    attachAudioSource(audioObjectUrl, audioFileInput.files[0].name + " (local file)");
  } else {
    attachAudioSource(audioUrl, audioUrl);
  }

  document.getElementById("epTitle").textContent = episodeStem;
  document.getElementById("setup").style.display = "none";
  document.getElementById("app").classList.add("active");

  renderRows();
  updateStats();
});

function renderRows() {
  rowsEl.innerHTML = "";
  segments.forEach((seg, i) => {
    const row = document.createElement("div");
    row.className = "row";
    row.dataset.idx = i;
    if (seg.review === "correct") row.classList.add("marked-correct");
    if (seg.review === "wrong") row.classList.add("marked-wrong");
    if (seg.review === "nonspeech") row.classList.add("marked-nonspeech");

    const t = document.createElement("div");
    t.className = "t";
    t.textContent = fmtTime(seg.startTime);

    const chip = document.createElement("div");
    chip.className = "speaker-chip";
    const displaySpeaker = seg.correctedSpeaker || seg.speaker;
    chip.textContent = displaySpeaker;
    const c = speakerColor(displaySpeaker);
    chip.style.background = c.bg;
    chip.style.color = c.fg;
    if (seg.correctedSpeaker) {
      chip.title = "was " + seg.origSpeaker;
    }

    const body = document.createElement("div");
    body.className = "body";
    body.textContent = seg.body;

    const actions = document.createElement("div");
    actions.className = "actions";

    const btnCorrect = document.createElement("button");
    btnCorrect.textContent = "✓";
    btnCorrect.title = "Correct (C)";
    btnCorrect.onclick = (e) => { e.stopPropagation(); markCorrect(i); };

    const btnWrong = document.createElement("button");
    btnWrong.textContent = "✗";
    btnWrong.title = "Wrong (W)";
    btnWrong.onclick = (e) => { e.stopPropagation(); openWrongPicker(i); };

    const btnNon = document.createElement("button");
    btnNon.textContent = "♪";
    btnNon.title = "Non-speech / music (N)";
    btnNon.onclick = (e) => { e.stopPropagation(); markNonspeech(i); };

    actions.appendChild(btnCorrect);
    actions.appendChild(btnWrong);
    actions.appendChild(btnNon);

    const note = document.createElement("div");
    note.className = "note";
    note.textContent = seg.note || "";

    row.appendChild(t);
    row.appendChild(chip);
    row.appendChild(body);
    row.appendChild(actions);
    row.appendChild(note);

    row.addEventListener("click", () => selectRow(i));
    row.addEventListener("dblclick", () => jumpTo(i));

    rowsEl.appendChild(row);
  });
}

function selectRow(i) {
  highlightRow(i, { scroll: true, playback: !player.paused });
}

function playFromTime(secs) {
  const target = Math.max(0, secs);
  const start = () => {
    player.currentTime = target;
    return player.play();
  };
  if (player.readyState >= 1) return start();
  return new Promise((resolve, reject) => {
    player.addEventListener("loadedmetadata", () => start().then(resolve).catch(reject), { once: true });
    player.load();
  });
}

function jumpTo(i) {
  const seg = segments[i];
  if (seg && player.src) {
    playFromTime(seg.startTime - 0.15).catch(err => {
      showAudioErr(`Couldn't start playback: ${err.message}. Click the native ▶ on the audio bar once first.`);
    });
  }
}

function markCorrect(i) {
  segments[i].review = "correct";
  segments[i].correctedSpeaker = null;
  segments[i].note = "";
  refreshRow(i);
  updateStats();
}

function markNonspeech(i) {
  segments[i].review = "nonspeech";
  segments[i].correctedSpeaker = null;
  segments[i].note = "music/non-speech";
  refreshRow(i);
  updateStats();
}

function openWrongPicker(i) {
  const seg = segments[i];
  const options = speakerList.concat(["NEW_SPEAKER"]);
  const choice = prompt(
    `Row ${i} is currently "${seg.speaker}".\nWho is it actually? Options:\n${options.join(", ")}\n\n(type exactly, or a new label)`,
    seg.speaker
  );
  if (choice === null) return;
  const trimmed = choice.trim();
  if (!trimmed) return;
  seg.review = "wrong";
  seg.correctedSpeaker = trimmed;
  seg.note = `→ ${trimmed}`;
  if (!speakerList.includes(trimmed)) speakerList.push(trimmed);
  refreshRow(i);
  updateStats();
}

function refreshRow(i) {
  // cheap: just re-render that row in place
  const el = rowsEl.children[i];
  if (!el) return;
  el.className = "row";
  if (i === currentIdx) {
    el.classList.add("current");
    if (!player.paused) el.classList.add("playback-active");
  }
  const seg = segments[i];
  if (seg.review === "correct") el.classList.add("marked-correct");
  if (seg.review === "wrong") el.classList.add("marked-wrong");
  if (seg.review === "nonspeech") el.classList.add("marked-nonspeech");

  const chip = el.querySelector(".speaker-chip");
  const displaySpeaker = seg.correctedSpeaker || seg.speaker;
  chip.textContent = displaySpeaker;
  const c = speakerColor(displaySpeaker);
  chip.style.background = c.bg;
  chip.style.color = c.fg;

  const note = el.querySelector(".note");
  note.textContent = seg.note || "";
}

function updateStats() {
  const total = segments.length;
  const reviewed = segments.filter(s => s.review !== null).length;
  const wrong = segments.filter(s => s.review === "wrong").length;
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statReviewed").textContent = reviewed;
  document.getElementById("statWrong").textContent = wrong;
}

document.addEventListener("keydown", (e) => {
  if (!document.getElementById("app").classList.contains("active")) return;
  if (document.activeElement && document.activeElement.id === "jumpBox") {
    if (e.key === "Enter") {
      const parts = document.activeElement.value.split(":").map(Number);
      let secs = 0;
      if (parts.length === 2) secs = parts[0] * 60 + parts[1];
      else if (parts.length === 1) secs = parts[0];
      if (!isNaN(secs) && player.src) {
        player.currentTime = secs;
      }
    }
    return;
  }

  if (currentIdx < 0) currentIdx = 0;

  switch (e.key.toLowerCase()) {
    case "j":
      e.preventDefault();
      selectRow(Math.min(segments.length - 1, currentIdx + 1));
      break;
    case "k":
      e.preventDefault();
      selectRow(Math.max(0, currentIdx - 1));
      break;
    case " ":
      e.preventDefault();
      if (player.src) {
        if (player.paused) {
          player.play().catch(err => showAudioErr(`Couldn't start playback: ${err.message}.`));
        } else {
          player.pause();
        }
      }
      break;
    case "enter":
      e.preventDefault();
      jumpTo(currentIdx);
      break;
    case "c":
      e.preventDefault();
      markCorrect(currentIdx);
      selectRow(Math.min(segments.length - 1, currentIdx + 1));
      break;
    case "w":
      e.preventDefault();
      openWrongPicker(currentIdx);
      break;
    case "n":
      e.preventDefault();
      markNonspeech(currentIdx);
      selectRow(Math.min(segments.length - 1, currentIdx + 1));
      break;
  }
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const corrections = segments
    .filter(s => s.review !== null)
    .map(s => ({
      idx: s.idx,
      startTime: s.startTime,
      endTime: s.endTime,
      body: s.body,
      originalSpeaker: s.origSpeaker,
      review: s.review,                                  // correct | wrong | nonspeech
      correctSpeaker: s.review === "wrong" ? s.correctedSpeaker
                      : s.review === "correct" ? s.origSpeaker
                      : null
    }));

  const out = {
    episode: episodeStem,
    reviewedCount: corrections.length,
    totalRows: segments.length,
    corrections
  };

  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = episodeStem.replace(/[^\w\-. ]+/g, "_") + ".corrections.json";
  a.click();
});
</script>

</body>
</html>
