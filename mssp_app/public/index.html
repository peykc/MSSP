<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#171514">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MSSP Archive">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MSSP Archive</title>
    <link rel="manifest" href="./site.webmanifest">
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/launch.css">
    <link rel="stylesheet" href="./css/archive.css">
    <link rel="stylesheet" href="./css/library.css">
    <link rel="stylesheet" href="./css/episode-list.css">
    <link rel="stylesheet" href="./css/episode-details.css">
    <link rel="stylesheet" href="./css/filters.css">
    <link rel="stylesheet" href="./css/tooltip.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/utilities.css">
    <link rel="stylesheet" href="./css/player.css">
  </head>
  <body>
    <main class="app" id="app">
      <section class="launch" id="launchView" aria-label="Collections">
        <header class="launch__header">
          <img class="launch__brand" src="./assets/brand/mssp-mark.png" alt="MSSP">
          <div class="launch__heading">
            <p class="eyebrow">Matt and Shane's Secret Podcast</p>
            <h1>The Complete Collection</h1>
          </div>
        </header>
        <div class="launch__content">
          <div class="launch__hero" id="launchHero"></div>
          <section class="launch__browse" aria-labelledby="launchBrowseTitle">
            <h2 id="launchBrowseTitle">Browse by section</h2>
            <div class="collection-grid" id="collectionGrid"></div>
          </section>
          <section class="launch__archive" id="archiveStats" aria-labelledby="archiveStatsTitle">
            <h2 id="archiveStatsTitle">Archive Stats</h2>
            <div class="archive-tidbits-card" id="archiveTidbitsPanel"></div>
            <div class="archive-stats" id="archiveStatsPanel"></div>
          </section>
        </div>
      </section>
    </main>
    <section class="library is-hidden" id="libraryView" aria-label="Episodes">
      <aside class="library__hero" id="heroPanel">
        <button class="back-button" id="backButton" type="button" aria-label="Back to collections">
          <span aria-hidden="true">‹</span>
        </button>
        <img class="hero-cover" id="heroCover" alt="">
        <div class="hero-details" id="heroDetails">
          <span>Select an episode to inspect details.</span>
        </div>
      </aside>

      <section class="episode-panel">
        <div class="panel-top">
          <div class="panel-title">
            <p class="eyebrow">Browse</p>
            <h2 id="panelTitle">Episodes</h2>
          </div>
          <div class="panel-controls">
            <label class="search">
              <span class="search__icon">⌕</span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="Search title, date, ep">
            </label>
            <div class="cover-filters" id="coverFilters" aria-label="Filter anthology by section"></div>
          </div>
        </div>

        <div class="episode-list" id="episodeList" tabindex="0" aria-label="Episode list">
          <div class="episode-list__spacer" id="listSpacer"></div>
          <div class="episode-list__items" id="listItems"></div>
        </div>
      </section>
    </section>
    <div class="calendar-modal" id="calendarModal" aria-hidden="true" hidden>
      <section class="calendar-dialog" id="calendarDialog" role="dialog" aria-modal="true" aria-labelledby="calendarTitle" tabindex="-1">
        <header class="calendar-dialog__header">
          <div class="calendar-dialog__heading">
            <h2 id="calendarTitle">Release Heatmap</h2>
            <div class="calendar-mode" role="group" aria-label="Heatmap style">
              <button type="button" class="calendar-mode__btn" data-mode="color" aria-pressed="true">Color</button>
              <button type="button" class="calendar-mode__btn" data-mode="brightness" aria-pressed="false">Brightness</button>
            </div>
          </div>
          <button class="calendar-dialog__close" id="calendarClose" type="button" aria-label="Close release heatmap">
            <span aria-hidden="true"></span>
          </button>
        </header>
        <div class="calendar-section">
          <p class="calendar-section__label">By weekday</p>
          <div class="calendar-heatmap calendar-heatmap--week" id="calendarWeekdays" role="group" aria-label="Episode releases by weekday"></div>
        </div>
        <div class="calendar-section">
          <p class="calendar-section__label">By month</p>
          <div class="calendar-heatmap calendar-heatmap--month" id="calendarMonths" role="group" aria-label="Episode releases by month"></div>
        </div>
        <div class="calendar-section">
          <p class="calendar-section__label">By day of month</p>
          <div class="calendar-heatmap" id="calendarHeatmap" role="group" aria-label="Episode releases by day of month"></div>
        </div>
        <div class="calendar-legend" aria-hidden="true">
          <span>Fewer</span>
          <span class="calendar-legend__scale"></span>
          <span>More</span>
        </div>
      </section>
    </div>
    <div class="calendar-modal" id="fullCalendarModal" aria-hidden="true" hidden>
      <section class="calendar-dialog full-calendar-dialog" id="fullCalendarDialog" role="dialog" aria-modal="true" aria-labelledby="fullCalendarTitle" tabindex="-1">
        <header class="calendar-dialog__header">
          <div class="calendar-dialog__heading">
            <h2 id="fullCalendarTitle">Archive Calendar</h2>
            <div class="full-calendar__legend" id="fullCalendarLegend" role="group" aria-label="Collections"></div>
          </div>
          <button class="calendar-dialog__close" id="fullCalendarClose" type="button" aria-label="Close archive calendar">
            <span aria-hidden="true"></span>
          </button>
        </header>
        <div class="full-calendar" id="fullCalendarBody">
          <div class="full-calendar__weekdays" id="fullCalendarWeekdays" aria-hidden="true"></div>
          <div class="full-calendar__months" id="fullCalendarMonths"></div>
        </div>
      </section>
    </div>
    <button class="player-backdrop" id="playerBackdrop" type="button" aria-label="Collapse full player" hidden></button>
    <section class="full-player" id="fullPlayer" role="dialog" aria-modal="true" aria-labelledby="fullPlayerTitle" tabindex="-1" data-mode="player" hidden>
      <button class="full-player__collapse" id="fullPlayerCollapse" type="button" aria-label="Collapse full player">
        <span class="full-player__grabber" aria-hidden="true"></span>
      </button>
      <div class="full-player__now-playing-area">
        <div class="full-player__hero" id="fullPlayerHero">
          <img class="full-player__cover" id="fullPlayerCover" alt="">
          <div class="full-player__status" id="fullPlayerStatusPanel" role="status">
            <strong id="fullPlayerStatus"></strong>
            <span id="fullPlayerStatusDetail"></span>
          </div>
        </div>
        <div class="full-player__compact" id="fullPlayerCompact" aria-label="Now playing"></div>
      </div>
      <div class="full-player__queue-panel" id="fullPlayerQueuePanel" aria-labelledby="fullPlayerQueueTitle">
        <div class="full-player__queue-header">
          <h3 id="fullPlayerQueueTitle">Continue Playing</h3>
          <span id="fullPlayerQueueMeta"></span>
        </div>
        <ol class="full-player__queue-list" id="fullPlayerQueueList" aria-label="Upcoming episodes"></ol>
      </div>
      <div class="full-player__aside">
        <div class="full-player__playback">
          <div class="full-player__copy">
            <p class="full-player__eyebrow" id="fullPlayerEyebrow"></p>
            <h2 class="full-player__title" id="fullPlayerTitle">
              <span class="full-player__episode"></span>
              <span class="full-player__title-viewport">
                <span class="full-player__title-text"></span>
              </span>
            </h2>
            <p class="full-player__meta" id="fullPlayerMeta"></p>
          </div>
          <div class="full-player__timeline" aria-label="Playback timeline">
            <span id="playerTimelineStart">00:00</span>
            <span class="player-timeline__scrubber">
              <input id="playerTimeline" type="range" min="0" max="0" value="0" disabled aria-label="Playback position unavailable">
              <output class="player-timeline__tooltip" id="playerTimelineTooltip" hidden>0:00</output>
            </span>
            <span id="playerTimelineEnd">--:--</span>
          </div>
        </div>
        <div class="full-player__controls">
          <button id="playerSeekBack" type="button" aria-label="Rewind 15 seconds">
            <svg aria-hidden="true" viewBox="0 0 48 48">
              <path d="M20.12 9.51A15 15 0 1 1 9.51 20.12"></path>
              <path class="seek-arrow" d="M14.32 11.06 20.16 5.77 22.02 12.73Z"></path>
              <text x="24" y="24" dy=".34em">15</text>
            </svg>
          </button>
          <button class="full-player__play" id="playerPlay" type="button" aria-label="Playback unavailable" disabled>
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m7 4 12 8-12 8V4Z"></path>
            </svg>
          </button>
          <button id="playerSeekForward" type="button" aria-label="Forward 30 seconds">
            <svg aria-hidden="true" viewBox="0 0 48 48">
              <path d="M27.88 9.51A15 15 0 1 0 38.49 20.12"></path>
              <path class="seek-arrow" d="M33.68 11.06 27.84 5.77 25.98 12.73Z"></path>
              <text x="24" y="24" dy=".34em">30</text>
            </svg>
          </button>
        </div>
        <div class="full-player__utility-row" aria-label="Player utilities">
          <button class="full-player__utility full-player__transcripts" id="playerTranscriptsToggle" type="button" aria-label="Show transcripts" aria-pressed="false">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M14 14a2 2 0 0 0 2-2V8h-2"></path>
              <path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"></path>
              <path d="M8 14a2 2 0 0 0 2-2V8H8"></path>
            </svg>
          </button>
          <button class="full-player__utility full-player__favorite" id="fullPlayerFavorite" type="button" aria-label="Add to favorites" aria-pressed="false">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m12 3.5 2.65 5.37 5.93.86-4.29 4.18 1.01 5.9L12 17.02l-5.3 2.79 1.01-5.9-4.29-4.18 5.93-.86L12 3.5Z"></path>
            </svg>
          </button>
          <button class="full-player__utility" id="playerQueueToggle" type="button" aria-label="Show Up Next" aria-pressed="false">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 6h12"></path>
              <path d="M8 12h12"></path>
              <path d="M8 18h12"></path>
              <path d="M4 6h.01"></path>
              <path d="M4 12h.01"></path>
              <path d="M4 18h.01"></path>
            </svg>
          </button>
        </div>
      </div>
    </section>
    <section class="mini-player" id="miniPlayer" aria-label="Current episode" hidden>
      <output class="player-timeline__tooltip mini-player__timeline-tooltip" id="miniPlayerTimelineTooltip" hidden>0:00</output>
      <button class="mini-player__expand" id="miniPlayerExpand" type="button" aria-label="Expand full player">
        <img id="miniPlayerCover" alt="">
        <span class="mini-player__copy">
          <span class="mini-player__title" id="miniPlayerTitle">
            <span class="mini-player__episode"></span>
            <span class="mini-player__title-text"></span>
          </span>
          <span id="miniPlayerStatus"></span>
        </span>
      </button>
      <div class="mini-player__controls" aria-label="Playback controls">
        <button id="miniPlayerSeekBack" type="button" aria-label="Rewind 15 seconds">
          <svg aria-hidden="true" viewBox="0 0 48 48">
            <path d="M20.12 9.51A15 15 0 1 1 9.51 20.12"></path>
            <path class="seek-arrow" d="M14.32 11.06 20.16 5.77 22.02 12.73Z"></path>
            <text x="24" y="24" dy=".34em">15</text>
          </svg>
        </button>
        <button class="mini-player__play" id="miniPlayerPlay" type="button" aria-label="Playback unavailable" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m7 4 12 8-12 8V4Z"></path>
          </svg>
        </button>
        <button id="miniPlayerSeekForward" type="button" aria-label="Forward 30 seconds">
          <svg aria-hidden="true" viewBox="0 0 48 48">
            <path d="M27.88 9.51A15 15 0 1 0 38.49 20.12"></path>
            <path class="seek-arrow" d="M33.68 11.06 27.84 5.77 25.98 12.73Z"></path>
            <text x="24" y="24" dy=".34em">30</text>
          </svg>
        </button>
      </div>
    </section>
    <div id="global-tooltip" class="global-tooltip"></div>
    <script src="./js/apiClient.js?v=static-first-data"></script>
    <script type="module" src="./js/main.js?v=frontend-module-split"></script>
  </body>
</html>
