<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#171514">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MSSP Archive">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MSSP Archive</title>
    <link rel="manifest" href="./site.webmanifest">
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/launch.css">
    <link rel="stylesheet" href="./css/library.css">
    <link rel="stylesheet" href="./css/episode-list.css">
    <link rel="stylesheet" href="./css/episode-details.css">
    <link rel="stylesheet" href="./css/filters.css">
    <link rel="stylesheet" href="./css/tooltip.css">
    <link rel="stylesheet" href="./css/responsive.css">
    <link rel="stylesheet" href="./css/utilities.css">
    <link rel="stylesheet" href="./css/player.css">
  </head>
  <body>
    <main class="app" id="app">
      <section class="launch" id="launchView" aria-label="Collections">
        <div class="launch__header">
          <p class="eyebrow">Matt and Shane's Secret Podcast</p>
          <h1>The Complete Collection</h1>
        </div>
        <div class="collection-grid" id="collectionGrid"></div>
      </section>

      <section class="library is-hidden" id="libraryView" aria-label="Episodes">
        <aside class="library__hero" id="heroPanel">
          <button class="back-button" id="backButton" type="button" aria-label="Back to collections">
            <span aria-hidden="true">‹</span>
          </button>
          <img class="hero-cover" id="heroCover" alt="">
          <div class="hero-details" id="heroDetails">
            <span>Select an episode to inspect details.</span>
          </div>
        </aside>

        <section class="episode-panel">
          <div class="panel-top">
            <div class="panel-title">
              <p class="eyebrow">Browse</p>
              <h2 id="panelTitle">Episodes</h2>
            </div>
            <label class="search">
              <span class="search__icon">⌕</span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="Search title, date, ep">
            </label>
            <div class="cover-filters" id="coverFilters" aria-label="Filter anthology by collection cover"></div>
          </div>

          <div class="episode-list" id="episodeList" tabindex="0" aria-label="Episode list">
            <div class="episode-list__spacer" id="listSpacer"></div>
            <div class="episode-list__items" id="listItems"></div>
          </div>
        </section>
      </section>
    </main>
    <button class="player-backdrop" id="playerBackdrop" type="button" aria-label="Collapse full player" hidden></button>
    <section class="full-player" id="fullPlayer" role="dialog" aria-modal="true" aria-labelledby="fullPlayerTitle" tabindex="-1" hidden>
      <button class="full-player__collapse" id="fullPlayerCollapse" type="button" aria-label="Collapse full player">
        <span class="full-player__grabber" aria-hidden="true"></span>
      </button>
      <img class="full-player__cover" id="fullPlayerCover" alt="">
      <div class="full-player__copy">
        <p class="full-player__eyebrow" id="fullPlayerEyebrow"></p>
        <h2 class="full-player__title" id="fullPlayerTitle"></h2>
        <p class="full-player__meta" id="fullPlayerMeta"></p>
      </div>
      <div class="full-player__status" id="fullPlayerStatusPanel" role="status">
        <strong id="fullPlayerStatus"></strong>
        <span id="fullPlayerStatusDetail"></span>
      </div>
      <div class="full-player__timeline" aria-label="Playback timeline">
        <span id="playerTimelineStart">00:00</span>
        <span class="player-timeline__scrubber">
          <input id="playerTimeline" type="range" min="0" max="0" value="0" disabled aria-label="Playback position unavailable">
          <output class="player-timeline__tooltip" id="playerTimelineTooltip" hidden>0:00</output>
        </span>
        <span id="playerTimelineEnd">--:--</span>
      </div>
      <div class="full-player__controls">
        <button id="playerSeekBack" type="button" aria-label="Rewind 15 seconds">
          <svg aria-hidden="true" viewBox="0 0 48 48">
            <path d="M20.12 9.51A15 15 0 1 1 9.51 20.12"></path>
            <path class="seek-arrow" d="M14.32 11.06 20.16 5.77 22.02 12.73Z"></path>
            <text x="24" y="24" dy=".34em">15</text>
          </svg>
        </button>
        <button class="full-player__play" id="playerPlay" type="button" aria-label="Playback unavailable" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m7 4 12 8-12 8V4Z"></path>
          </svg>
        </button>
        <button id="playerSeekForward" type="button" aria-label="Forward 30 seconds">
          <svg aria-hidden="true" viewBox="0 0 48 48">
            <path d="M27.88 9.51A15 15 0 1 0 38.49 20.12"></path>
            <path class="seek-arrow" d="M33.68 11.06 27.84 5.77 25.98 12.73Z"></path>
            <text x="24" y="24" dy=".34em">30</text>
          </svg>
        </button>
      </div>
    </section>
    <section class="mini-player" id="miniPlayer" aria-label="Current episode" hidden>
      <output class="player-timeline__tooltip mini-player__timeline-tooltip" id="miniPlayerTimelineTooltip" hidden>0:00</output>
      <button class="mini-player__expand" id="miniPlayerExpand" type="button" aria-label="Expand full player">
        <img id="miniPlayerCover" alt="">
        <span class="mini-player__copy">
          <strong id="miniPlayerTitle"></strong>
          <span id="miniPlayerStatus"></span>
        </span>
      </button>
      <div class="mini-player__controls" aria-label="Playback controls">
        <button id="miniPlayerSeekBack" type="button" aria-label="Rewind 15 seconds">
          <svg aria-hidden="true" viewBox="0 0 48 48">
            <path d="M20.12 9.51A15 15 0 1 1 9.51 20.12"></path>
            <path class="seek-arrow" d="M14.32 11.06 20.16 5.77 22.02 12.73Z"></path>
            <text x="24" y="24" dy=".34em">15</text>
          </svg>
        </button>
        <button class="mini-player__play" id="miniPlayerPlay" type="button" aria-label="Playback unavailable" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m7 4 12 8-12 8V4Z"></path>
          </svg>
        </button>
        <button id="miniPlayerSeekForward" type="button" aria-label="Forward 30 seconds">
          <svg aria-hidden="true" viewBox="0 0 48 48">
            <path d="M27.88 9.51A15 15 0 1 0 38.49 20.12"></path>
            <path class="seek-arrow" d="M33.68 11.06 27.84 5.77 25.98 12.73Z"></path>
            <text x="24" y="24" dy=".34em">30</text>
          </svg>
        </button>
      </div>
    </section>
    <div id="global-tooltip" class="global-tooltip"></div>
    <script src="./js/apiClient.js?v=static-first-data"></script>
    <script type="module" src="./js/main.js?v=frontend-module-split"></script>
  </body>
</html>
