name: Deploy MSSP Archive to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mssp_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm install

      - name: Refresh collection files
        run: python ../data/organizefilepath.py

      - name: Export static data
        run: npm run export:all

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: mssp_app/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
